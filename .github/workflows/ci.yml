name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '9'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build core (required by optimizer + drift typecheck)
        run: pnpm --filter @helios-cloud/core build

      - name: Type check (non-dashboard packages)
        run: pnpm --filter @helios-cloud/core --filter @helios-cloud/optimizer --filter @helios-cloud/drift typecheck

      - name: Lint (non-dashboard packages)
        run: pnpm --filter @helios-cloud/core --filter @helios-cloud/optimizer --filter @helios-cloud/drift lint
        continue-on-error: true

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build core package (test dependencies)
        run: pnpm --filter @helios-cloud/core build

      - name: Run tests with coverage
        run: pnpm --filter @helios-cloud/core --filter @helios-cloud/optimizer --filter @helios-cloud/drift test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build core packages
        run: |
          pnpm --filter @helios-cloud/core build
          pnpm --filter @helios-cloud/optimizer build
          pnpm --filter @helios-cloud/drift build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: packages/*/dist/
          retention-days: 7

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Rust Build & Test ────────────────────────────────────────────────────────
  rust:
    name: Rust Scanner (helios-scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --check -p helios-scanner

      - name: Clippy
        run: cargo clippy -p helios-scanner --all-targets -- -D warnings
        continue-on-error: true

      - name: Run tests (24 tests)
        run: cargo test -p helios-scanner

      - name: Build release binary
        run: cargo build --release -p helios-scanner

  # ── Helm Lint ─────────────────────────────────────────────────────────────────
  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint charts/helios/

      - name: Template render test
        run: helm template helios charts/helios/ --set aws.accountId=123456789012 > /dev/null
