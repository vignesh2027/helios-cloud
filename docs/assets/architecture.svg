<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="480" rx="16" fill="url(#bg)"/>
  <rect width="900" height="480" rx="16" fill="none" stroke="#262626" stroke-width="1"/>

  <!-- title -->
  <text x="450" y="34" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="15" font-weight="bold" text-anchor="middle" filter="url(#glow)">HELIOS — Platform Architecture</text>
  <line x1="80" y1="46" x2="820" y2="46" stroke="#262626" stroke-width="1"/>

  <!-- ═══ ROW 1: CLIENT LAYER ═══ -->
  <text x="450" y="68" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" letter-spacing="3">CLIENT LAYER</text>

  <!-- CLI -->
  <rect x="60" y="76" width="130" height="52" rx="8" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <rect x="60" y="76" width="130" height="4" rx="2" fill="url(#orange)"/>
  <text x="125" y="104" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" text-anchor="middle">helios CLI</text>
  <text x="125" y="120" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9.5" text-anchor="middle">Commander.js</text>

  <!-- SDK -->
  <rect x="210" y="76" width="130" height="52" rx="8" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <rect x="210" y="76" width="130" height="4" rx="2" fill="url(#blue)"/>
  <text x="275" y="104" fill="#60a5fa" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" text-anchor="middle">@helios/sdk</text>
  <text x="275" y="120" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9.5" text-anchor="middle">TypeScript SDK</text>

  <!-- REST API -->
  <rect x="360" y="76" width="130" height="52" rx="8" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <rect x="360" y="76" width="130" height="4" rx="2" fill="url(#orange)"/>
  <text x="425" y="104" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" text-anchor="middle">REST API</text>
  <text x="425" y="120" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9.5" text-anchor="middle">Fastify + WS</text>

  <!-- Dashboard -->
  <rect x="510" y="76" width="130" height="52" rx="8" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <rect x="510" y="76" width="130" height="4" rx="2" fill="url(#green)"/>
  <text x="575" y="104" fill="#4ade80" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" text-anchor="middle">Dashboard</text>
  <text x="575" y="120" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9.5" text-anchor="middle">Next.js 14</text>

  <!-- Prometheus -->
  <rect x="660" y="76" width="170" height="52" rx="8" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <rect x="660" y="76" width="170" height="4" rx="2" fill="#7c3aed"/>
  <text x="745" y="104" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" text-anchor="middle">Observability</text>
  <text x="745" y="120" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9.5" text-anchor="middle">Prometheus · Grafana</text>

  <!-- arrows down to core -->
  <line x1="125" y1="128" x2="125" y2="166" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="275" y1="128" x2="275" y2="166" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="425" y1="128" x2="425" y2="166" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="575" y1="128" x2="575" y2="166" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ═══ ROW 2: CORE ENGINE ═══ -->
  <text x="450" y="162" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" letter-spacing="3">HELIOS CORE ENGINE</text>

  <!-- Core big box -->
  <rect x="60" y="170" width="770" height="88" rx="10" fill="#111111" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>

  <!-- ResourceGraph -->
  <rect x="76" y="182" width="140" height="64" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="146" y="207" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" text-anchor="middle">Resource Graph</text>
  <text x="146" y="223" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">DAG · Topo Sort</text>
  <text x="146" y="237" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">State Snapshots</text>

  <!-- Cost Optimizer -->
  <rect x="228" y="182" width="140" height="64" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="298" y="207" fill="#4ade80" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" text-anchor="middle">Cost Optimizer</text>
  <text x="298" y="223" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Rightsizing · Idle</text>
  <text x="298" y="237" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Savings Plans</text>

  <!-- Drift Detector -->
  <rect x="380" y="182" width="140" height="64" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="450" y="207" fill="#facc15" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" text-anchor="middle">Drift Detector</text>
  <text x="450" y="223" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Terraform State</text>
  <text x="450" y="237" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Auto-Remediate</text>

  <!-- Policy Engine -->
  <rect x="532" y="182" width="140" height="64" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="602" y="207" fill="#f472b6" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" text-anchor="middle">Policy Engine</text>
  <text x="602" y="223" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">CIS · SOC2</text>
  <text x="602" y="237" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">OPA/Rego</text>

  <!-- Event Bus -->
  <rect x="684" y="182" width="134" height="64" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="751" y="207" fill="#60a5fa" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" text-anchor="middle">Event Bus</text>
  <text x="751" y="223" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">TypedEventEmitter</text>
  <text x="751" y="237" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">WebSocket Push</text>

  <!-- arrows down to providers -->
  <line x1="180" y1="258" x2="180" y2="296" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-orange)"/>
  <line x1="450" y1="258" x2="450" y2="296" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-orange)"/>
  <line x1="680" y1="258" x2="680" y2="296" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-orange)"/>

  <!-- ═══ ROW 3: PROVIDER LAYER ═══ -->
  <text x="450" y="292" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" letter-spacing="3">PROVIDER LAYER</text>

  <!-- AWS -->
  <rect x="60" y="300" width="240" height="68" rx="10" fill="#1c1c1c" stroke="#FF9900" stroke-width="1.5"/>
  <text x="180" y="324" fill="#FF9900" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" text-anchor="middle">Amazon Web Services</text>
  <text x="180" y="344" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">EC2 · S3 · RDS · Lambda · EKS · IAM</text>
  <text x="180" y="360" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">CloudWatch · Cost Explorer · VPC</text>

  <!-- GCP -->
  <rect x="320" y="300" width="200" height="68" rx="10" fill="#1c1c1c" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="420" y="324" fill="#4285F4" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" text-anchor="middle">Google Cloud</text>
  <text x="420" y="344" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">Compute · GKE · Cloud SQL</text>
  <text x="420" y="360" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">coming soon</text>

  <!-- Azure -->
  <rect x="540" y="300" width="200" height="68" rx="10" fill="#1c1c1c" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="640" y="324" fill="#0078d4" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" text-anchor="middle">Microsoft Azure</text>
  <text x="640" y="344" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">VMs · AKS · Functions</text>
  <text x="640" y="360" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">coming soon</text>

  <!-- Infra label -->
  <rect x="760" y="300" width="70" height="68" rx="10" fill="#1c1c1c" stroke="#374151"/>
  <text x="795" y="325" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Terraform</text>
  <text x="795" y="341" fill="#7c3aed" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Modules</text>
  <text x="795" y="355" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Helm Chart</text>
  <text x="795" y="367" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Kubernetes</text>

  <!-- ═══ BOTTOM: DEPLOYMENT ═══ -->
  <text x="450" y="396" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" letter-spacing="3">DEPLOYMENT OPTIONS</text>

  <rect x="60" y="404" width="155" height="40" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="137" y="420" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" text-anchor="middle">☸ Kubernetes</text>
  <text x="137" y="436" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Helm · HPA · IRSA</text>

  <rect x="230" y="404" width="155" height="40" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="307" y="420" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" text-anchor="middle">🐳 Docker Compose</text>
  <text x="307" y="436" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Local full stack</text>

  <rect x="400" y="404" width="155" height="40" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="477" y="420" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" text-anchor="middle">📦 npm install</text>
  <text x="477" y="436" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Global CLI binary</text>

  <rect x="570" y="404" width="155" height="40" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="647" y="420" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" text-anchor="middle">⚡ SDK / API</text>
  <text x="647" y="436" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Programmatic use</text>

  <rect x="740" y="404" width="120" height="40" rx="7" fill="#1a1a1a" stroke="#374151"/>
  <text x="800" y="420" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" text-anchor="middle">🔒 IRSA + KMS</text>
  <text x="800" y="436" fill="#6b7280" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">Least-privilege</text>

  <!-- bottom border line -->
  <line x1="80" y1="460" x2="820" y2="460" stroke="#262626" stroke-width="1"/>
  <text x="450" y="474" fill="#4b5563" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">github.com/vignesh2027/helios-cloud  ·  Apache 2.0  ·  TypeScript · Node.js · pnpm workspaces · turborepo</text>
</svg>
