apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helios.fullname" . }}-api
  labels:
    {{- include "helios.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "helios.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "helios.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "helios.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.api.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.api.securityContext.runAsUser }}
        fsGroup: {{ .Values.api.securityContext.fsGroup }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: AWS_ACCOUNT_ID
              value: {{ .Values.aws.accountId | quote }}
            - name: PORT
              value: "8080"
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "helios.fullname" . }}-config
            {{- range .Values.api.extraEnvFrom }}
            - {{ toYaml . | nindent 14 | trim }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.api.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.api.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop: {{ toYaml .Values.api.securityContext.capabilities.drop | nindent 16 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
