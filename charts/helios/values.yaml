# Default values for helios chart

global:
  imageRegistry: ghcr.io
  imagePullSecrets: []

# ── AWS Configuration ─────────────────────────────────────────────────────────
aws:
  region: us-east-1
  accountId: ""
  roleArn: ""
  eksClusterName: ""

# ── API Server ────────────────────────────────────────────────────────────────
api:
  enabled: true
  image:
    repository: vignesh2027/helios-cloud
    tag: ""
    pullPolicy: IfNotPresent

  replicas: 2

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  ingress:
    enabled: false
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: helios-api.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: helios-api-tls
        hosts:
          - helios-api.example.com

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  env: {}
  extraEnvFrom: []

  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: ""

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: api

# ── Dashboard ─────────────────────────────────────────────────────────────────
dashboard:
  enabled: true
  image:
    repository: vignesh2027/helios-dashboard
    tag: ""
    pullPolicy: IfNotPresent

  replicas: 2

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: nginx
    hosts:
      - host: helios.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── ServiceMonitor for Prometheus Operator ────────────────────────────────────
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: true
  ingressRules:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

# ── RBAC ──────────────────────────────────────────────────────────────────────
rbac:
  create: true
  clusterRole: false

# ── Node Selector, Tolerations, Affinity ─────────────────────────────────────
nodeSelector:
  role: system

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [helios]
          topologyKey: kubernetes.io/hostname
